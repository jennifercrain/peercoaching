<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAB OWL - Programming Labs</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .anim-fade-up { animation: fadeUp 0.5s ease forwards; opacity: 0; }
    .anim-d1 { animation-delay: 0.1s; }
    .anim-d2 { animation-delay: 0.25s; }
    .anim-d3 { animation-delay: 0.4s; }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
 </head>
 <body data-template-id="__page-root" class="min-h-screen w-full">
  <main class="max-w-5xl mx-auto px-6 py-10 space-y-12"><!-- SECTION 1: Programming Labs -->
   <section class="anim-fade-up anim-d1">
    <div class="flex items-center gap-3 mb-5">
     <div class="w-1.5 h-10 rounded-full bg-[#0070F0]"></div>
     <h1 data-template-id="main-heading" class="canva-text font-bold text-[#002855]"></h1>
    </div>
    <p data-template-id="intro-text" class="canva-text text-[#333] mb-5"></p>
    <div class="bg-[#f0f7ff] border-l-4 border-[#46B1EF] rounded-r-lg p-5 mb-4">
     <h2 data-template-id="behaviors-heading" class="canva-text font-bold text-[#002855] mb-3"></h2>
     <p data-template-id="behaviors-intro" class="canva-text text-[#333] mb-3"></p>
     <ul class="space-y-2 ml-1">
      <li class="flex items-start gap-2"><i data-lucide="alert-circle" class="w-4 h-4 text-[#0070F0] shrink-0 mt-0.5"></i><span data-template-id="behavior-1" class="canva-text text-[#333]"></span></li>
      <li class="flex items-start gap-2"><i data-lucide="alert-circle" class="w-4 h-4 text-[#0070F0] shrink-0 mt-0.5"></i><span data-template-id="behavior-2" class="canva-text text-[#333]"></span></li>
      <li class="flex items-start gap-2"><i data-lucide="alert-circle" class="w-4 h-4 text-[#0070F0] shrink-0 mt-0.5"></i><span data-template-id="behavior-3" class="canva-text text-[#333]"></span></li>
      <li class="flex items-start gap-2"><i data-lucide="alert-circle" class="w-4 h-4 text-[#0070F0] shrink-0 mt-0.5"></i><span data-template-id="behavior-4" class="canva-text text-[#333]"></span></li>
     </ul>
     <p data-template-id="process-problem" class="canva-text text-[#333] mt-4"></p>
    </div>
    <p data-template-id="purpose-text" class="canva-text text-[#333]"></p>
   </section><!-- SECTION 2: The Role of the Peer Coach -->
   <section class="anim-fade-up anim-d2">
    <div data-template-id="role-banner" class="canva-section rounded-xl p-6 mb-5">
     <h2 data-template-id="role-heading" class="canva-text font-bold text-white mb-2"></h2>
     <p data-template-id="role-text" class="canva-text text-white/90"></p>
    </div>
    <p data-template-id="role-text-2" class="canva-text text-[#333] mb-5"></p>
    <div class="grid sm:grid-cols-2 gap-3">
     <div class="flex items-center gap-2 bg-white border border-[#46B1EF]/30 rounded-lg px-4 py-3"><i data-lucide="check-circle" class="w-4 h-4 text-[#97E152] shrink-0"></i> <span data-template-id="helps-1" class="canva-text text-[#333]"></span>
     </div>
     <div class="flex items-center gap-2 bg-white border border-[#46B1EF]/30 rounded-lg px-4 py-3"><i data-lucide="check-circle" class="w-4 h-4 text-[#97E152] shrink-0"></i> <span data-template-id="helps-2" class="canva-text text-[#333]"></span>
     </div>
     <div class="flex items-center gap-2 bg-white border border-[#46B1EF]/30 rounded-lg px-4 py-3"><i data-lucide="check-circle" class="w-4 h-4 text-[#97E152] shrink-0"></i> <span data-template-id="helps-3" class="canva-text text-[#333]"></span>
     </div>
     <div class="flex items-center gap-2 bg-white border border-[#46B1EF]/30 rounded-lg px-4 py-3"><i data-lucide="check-circle" class="w-4 h-4 text-[#97E152] shrink-0"></i> <span data-template-id="helps-4" class="canva-text text-[#333]"></span>
     </div>
    </div>
    <p data-template-id="role-closer" class="canva-text text-[#333] mt-5"></p>
   </section><!-- SECTION 3: The Lab Owl Framework -->
   <section class="anim-fade-up anim-d3">
    <div class="flex items-center gap-3 mb-5">
     <div class="w-1.5 h-10 rounded-full bg-[#97E152]"></div>
     <h2 data-template-id="framework-heading" class="canva-text font-bold text-[#002855]"></h2>
    </div>
    <p data-template-id="framework-text" class="canva-text text-[#333] mb-3"></p>
    <p data-template-id="framework-text-2" class="canva-text text-[#333] mb-3"></p>
    <p data-template-id="framework-text-3" class="canva-text text-[#333] mb-6"></p>
    <h3 data-template-id="owl-helps-heading" class="canva-text font-bold text-[#002855] mb-4"></h3>
    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
     <div class="rounded-lg p-4 bg-gradient-to-br from-[#002855] to-[#0070F0] flex items-center gap-3"><i data-lucide="search" class="w-5 h-5 text-[#97E152] shrink-0"></i> <span data-template-id="owl-helps-1" class="canva-text text-white font-medium"></span>
     </div>
     <div class="rounded-lg p-4 bg-gradient-to-br from-[#0070F0] to-[#46B1EF] flex items-center gap-3"><i data-lucide="eye" class="w-5 h-5 text-white shrink-0"></i> <span data-template-id="owl-helps-2" class="canva-text text-white font-medium"></span>
     </div>
     <div class="rounded-lg p-4 bg-gradient-to-br from-[#002855] to-[#0070F0] flex items-center gap-3"><i data-lucide="flask-conical" class="w-5 h-5 text-[#97E152] shrink-0"></i> <span data-template-id="owl-helps-3" class="canva-text text-white font-medium"></span>
     </div>
     <div class="rounded-lg p-4 bg-gradient-to-br from-[#0070F0] to-[#46B1EF] flex items-center gap-3"><i data-lucide="scan-line" class="w-5 h-5 text-white shrink-0"></i> <span data-template-id="owl-helps-4" class="canva-text text-white font-medium"></span>
     </div>
     <div class="rounded-lg p-4 bg-gradient-to-br from-[#002855] to-[#46B1EF] flex items-center gap-3"><i data-lucide="rocket" class="w-5 h-5 text-[#97E152] shrink-0"></i> <span data-template-id="owl-helps-5" class="canva-text text-white font-medium"></span>
     </div>
    </div>
   </section>
  </main>
