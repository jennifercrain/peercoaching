<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAB OWL Interactive Learning</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Arial:wght@400;700&display=swap');
    
    * {
      font-family: Arial, Helvetica, sans-serif;
    }
    
    .letter-btn {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      user-select: none;
    }
    
    .letter-btn:hover {
      transform: scale(1.1);
    }
    
    .letter-btn.active {
      transform: scale(1.15);
    }
    
    .explanation-card {
      animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(0, 112, 240, 0.4);
      }
      50% {
        box-shadow: 0 0 0 15px rgba(0, 112, 240, 0);
      }
    }
    
    .pulse-hint {
      animation: pulse 2s infinite;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app-container" class="h-full w-full overflow-auto" style="background-color: #FFFFFF;">
   <div class="min-h-full flex flex-col p-8">
    <!-- Title -->
    <div class="mb-8">
     <h1 id="main-title" class="text-2xl font-bold text-center" style="color: #002855;">Click each letter to discover</h1>
    </div><!-- LAB OWL Letters -->
    <div class="flex flex-wrap justify-center gap-3 md:gap-4 mb-8">
     <!-- L --> <button class="letter-btn pulse-hint w-16 h-16 md:w-24 md:h-24 rounded-2xl flex items-center justify-center text-4xl md:text-6xl font-bold text-white shadow-lg" style="background-color: #002855;" data-letter="L" aria-label="L - Locate the Block">L</button> <!-- A --> <button class="letter-btn w-16 h-16 md:w-24 md:h-24 rounded-2xl flex items-center justify-center text-4xl md:text-6xl font-bold text-white shadow-lg" style="background-color: #0070F0;" data-letter="A" aria-label="A - Analyze What's Happening">A</button> <!-- B --> <button class="letter-btn w-16 h-16 md:w-24 md:h-24 rounded-2xl flex items-center justify-center text-4xl md:text-6xl font-bold text-white shadow-lg" style="background-color: #97E152;" data-letter="B" aria-label="B - Break It Down">B</button> <!-- Spacer -->
     <div class="w-4 md:w-8"></div><!-- O --> <button class="letter-btn w-16 h-16 md:w-24 md:h-24 rounded-2xl flex items-center justify-center text-4xl md:text-6xl font-bold text-white shadow-lg" style="background-color: #46B1EF;" data-letter="O" aria-label="O - Observe the Pattern">O</button> <!-- W --> <button class="letter-btn w-16 h-16 md:w-24 md:h-24 rounded-2xl flex items-center justify-center text-4xl md:text-6xl font-bold text-white shadow-lg" style="background-color: #002855;" data-letter="W" aria-label="W - Work the Hypothesis">W</button> <!-- L2 --> <button class="letter-btn w-16 h-16 md:w-24 md:h-24 rounded-2xl flex items-center justify-center text-4xl md:text-6xl font-bold text-white shadow-lg" style="background-color: #0070F0;" data-letter="L2" aria-label="L - Link to Your Conclusion">L</button>
    </div><!-- Explanation Cards Container -->
    <div id="explanation-container" class="flex gap-4 mb-8 justify-center flex-wrap"></div><!-- Progress Dots - Below Cards -->
    <div class="flex justify-center gap-3">
     <div class="progress-dot w-3 h-3 rounded-full transition-colors duration-300" data-for="L" style="background-color: #ddd;"></div>
     <div class="progress-dot w-3 h-3 rounded-full transition-colors duration-300" data-for="A" style="background-color: #ddd;"></div>
     <div class="progress-dot w-3 h-3 rounded-full transition-colors duration-300" data-for="B" style="background-color: #ddd;"></div>
     <div class="progress-dot w-3 h-3 rounded-full transition-colors duration-300" data-for="O" style="background-color: #ddd;"></div>
     <div class="progress-dot w-3 h-3 rounded-full transition-colors duration-300" data-for="W" style="background-color: #ddd;"></div>
     <div class="progress-dot w-3 h-3 rounded-full transition-colors duration-300" data-for="L2" style="background-color: #ddd;"></div>
    </div>
   </div>
  </div>
  <script>
    const defaultConfig = {
      main_title: "Click each letter to discover",
      background_color: "#FFFFFF",
      primary_color: "#002855",
      secondary_color: "#0070F0",
      accent_color: "#97E152",
      text_color: "#4A5568",
      font_family: "Arial"
    };
    
    const letterData = {
      L: {
        title: "Locate the Block",
        description: "Find where you're stuck. What step or idea is confusing? Pinpoint the exact spot where your understanding breaks down.",
        color: "#002855"
      },
      A: {
        title: "Analyze What's Happening",
        description: "Look closely at the problem. What information do you have? What are you trying to find out? Gather all the clues.",
        color: "#0070F0"
      },
      B: {
        title: "Break It Down",
        description: "Split the big problem into smaller, manageable pieces. Tackle one piece at a time to make progress easier.",
        color: "#97E152"
      },
      O: {
        title: "Observe the Pattern",
        description: "Look for similarities to problems you've solved before. What strategies worked then? Can you spot any patterns or rules?",
        color: "#46B1EF"
      },
      W: {
        title: "Work the Hypothesis",
        description: "Make an educated guess and test it out. Try your idea, see what happens, and adjust if needed. Learning comes from experimenting!",
        color: "#002855"
      },
      L2: {
        title: "Lock in Learning",
        description: "Solidify your understanding. What did you learn? How will you use this next time? Lock it into your memory.",
        color: "#0070F0"
      }
    };
    
    let visitedLetters = new Set();
    let config = { ...defaultConfig };
    
    function onConfigChange(cfg) {
      config = { ...defaultConfig, ...cfg };
      
      const titleEl = document.getElementById('main-title');
      if (titleEl) {
        titleEl.textContent = config.main_title;
        titleEl.style.color = config.primary_color;
        titleEl.style.fontFamily = `${config.font_family}, Arial, sans-serif`;
      }
      
      const container = document.getElementById('app-container');
      if (container) {
        container.style.backgroundColor = config.background_color;
      }
      
      document.querySelectorAll('.letter-btn, #card-letter, #card-title, #completion-message span').forEach(el => {
        el.style.fontFamily = `${config.font_family}, Arial, sans-serif`;
      });
    }
    
    function showExplanation(letter) {
      const data = letterData[letter];
      if (!data) return;
      
      const container = document.getElementById('explanation-container');
      
      // Check if card for this letter already exists
      let card = document.querySelector(`[data-letter-card="${letter}"]`);
      
      if (!card) {
        // Create new card
        card = document.createElement('div');
        card.setAttribute('data-letter-card', letter);
        card.className = 'explanation-card rounded-xl p-3 md:p-4 shadow-lg flex-shrink-0' ;
        card.style.backgroundColor = '#F5F7FA';
        card.style.width = '160px';
        card.style.minWidth = '160px';
        
        card.innerHTML = `
          <div>
            <h2 class="card-title text-sm md:text-base font-bold mb-2" style="color: ${data.color};">${data.title}</h2>
            <p class="card-description text-xs md:text-sm" style="color: ${config.text_color};">${data.description}</p>
          </div>
        `;
        
        container.appendChild(card);
      }
      
      visitedLetters.add(letter);
      updateProgress();
      
      document.querySelectorAll('.letter-btn').forEach(btn => {
        btn.classList.remove('active', 'pulse-hint');
      });
      document.querySelector(`[data-letter="${letter}"]`).classList.add('active');
    }
    
    function updateProgress() {
      document.querySelectorAll('.progress-dot').forEach(dot => {
        const letter = dot.dataset.for;
        if (visitedLetters.has(letter)) {
          dot.style.backgroundColor = letterData[letter].color;
        }
      });
    }
    
    document.querySelectorAll('.letter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        showExplanation(btn.dataset.letter);
      });
    });
    
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities: (cfg) => ({
          recolorables: [
            {
              get: () => cfg.background_color || defaultConfig.background_color,
              set: (v) => { cfg.background_color = v; window.elementSdk.setConfig({ background_color: v }); }
            },
            {
              get: () => cfg.primary_color || defaultConfig.primary_color,
              set: (v) => { cfg.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); }
            },
            {
              get: () => cfg.text_color || defaultConfig.text_color,
              set: (v) => { cfg.text_color = v; window.elementSdk.setConfig({ text_color: v }); }
            }
          ],
          borderables: [],
          fontEditable: {
            get: () => cfg.font_family || defaultConfig.font_family,
            set: (v) => { cfg.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
          },
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (cfg) => new Map([
          ["main_title", cfg.main_title || defaultConfig.main_title]
        ])
      });
    }
    
    onConfigChange(config);
  </script>

</html>
