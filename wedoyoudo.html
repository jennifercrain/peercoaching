<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guided Practice Stages</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Arial:wght@400;600;700&display=swap');
    
    * {
      font-family: Arial, sans-serif;
    }
    
    .stage-card {
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .stage-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0, 40, 85, 0.15);
    }
    
    .stage-card.active {
      border-color: #0070F0;
      box-shadow: 0 0 0 3px rgba(0, 112, 240, 0.2);
    }
    
    .drop-zone {
      min-height: 60px;
      transition: all 0.2s ease;
    }
    
    .drop-zone.drag-over {
      background-color: rgba(151, 225, 82, 0.2);
      border-color: #97E152;
    }
    
    .draggable-item {
      cursor: grab;
      transition: all 0.2s ease;
    }
    
    .draggable-item:active {
      cursor: grabbing;
    }
    
    .draggable-item.dragging {
      opacity: 0.5;
      transform: scale(0.95);
    }
    
    .correct-answer {
      background-color: rgba(151, 225, 82, 0.2);
      border-color: #97E152;
    }
    
    .incorrect-answer {
      background-color: rgba(255, 100, 100, 0.2);
      border-color: #ff6464;
    }
    
    .fade-in {
      animation: fadeIn 0.4s ease-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .pulse {
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app-container" class="h-full overflow-auto" style="background-color: #F1F1F1;">
   <div class="max-w-4xl mx-auto p-6 pb-12">
    <!-- Header -->
    <header class="text-center mb-8">
     <h1 id="main-title" class="text-3xl font-bold mb-3" style="color: #002855;">From Observation to Independence</h1>
     <p id="intro-text" class="text-lg" style="color: #002855;">Match each coaching activity to the correct stage of the learning process</p>
    </header><!-- Progress Indicator -->
    <div class="flex justify-center mb-8">
     <div class="flex items-center gap-2 px-4 py-2 rounded-full" style="background-color: white; box-shadow: 0 2px 8px rgba(0,40,85,0.1);">
      <span class="text-sm font-medium" style="color: #002855;">Progress:</span>
      <div class="w-32 h-2 rounded-full" style="background-color: #e5e5e5;">
       <div id="progress-bar" class="h-full rounded-full transition-all duration-500" style="background-color: #97E152; width: 0%;"></div>
      </div><span id="progress-text" class="text-sm font-medium" style="color: #0070F0;">0/6</span>
     </div>
    </div><!-- Stage Cards -->
    <div class="grid md:grid-cols-3 gap-4 mb-8">
     <!-- I Do Stage -->
     <div class="stage-card rounded-xl p-5 border-2" style="background-color: white; border-color: #e5e5e5;" data-stage="i-do">
      <div class="flex items-center gap-3 mb-4">
       <div class="w-12 h-12 rounded-full flex items-center justify-center text-white font-bold text-lg" style="background-color: #002855;">
        1
       </div>
       <div>
        <h3 class="font-bold text-lg" style="color: #002855;">I Do</h3>
        <p class="text-sm" style="color: #46B1EF;">Demonstration Phase</p>
       </div>
      </div>
      <div id="drop-i-do" class="drop-zone rounded-lg border-2 border-dashed p-3 flex flex-col gap-2" style="border-color: #002855; background-color: #f8f9fa;"></div>
     </div><!-- We Do Stage -->
     <div class="stage-card rounded-xl p-5 border-2" style="background-color: white; border-color: #e5e5e5;" data-stage="we-do">
      <div class="flex items-center gap-3 mb-4">
       <div class="w-12 h-12 rounded-full flex items-center justify-center text-white font-bold text-lg" style="background-color: #0070F0;">
        2
       </div>
       <div>
        <h3 class="font-bold text-lg" style="color: #002855;">We Do</h3>
        <p class="text-sm" style="color: #46B1EF;">Guided Practice</p>
       </div>
      </div>
      <div id="drop-we-do" class="drop-zone rounded-lg border-2 border-dashed p-3 flex flex-col gap-2" style="border-color: #0070F0; background-color: #f8f9fa;"></div>
     </div><!-- You Do Stage -->
     <div class="stage-card rounded-xl p-5 border-2" style="background-color: white; border-color: #e5e5e5;" data-stage="you-do">
      <div class="flex items-center gap-3 mb-4">
       <div class="w-12 h-12 rounded-full flex items-center justify-center text-white font-bold text-lg" style="background-color: #97E152;">
        3
       </div>
       <div>
        <h3 class="font-bold text-lg" style="color: #002855;">You Do</h3>
        <p class="text-sm" style="color: #46B1EF;">Independent Practice</p>
       </div>
      </div>
      <div id="drop-you-do" class="drop-zone rounded-lg border-2 border-dashed p-3 flex flex-col gap-2" style="border-color: #97E152; background-color: #f8f9fa;"></div>
     </div>
    </div><!-- Draggable Items Container -->
    <div class="rounded-xl p-6 border-2" style="background-color: white; border-color: #e5e5e5;">
     <h3 class="font-bold text-lg mb-4 flex items-center gap-2" style="color: #002855;">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
       <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
      </svg> Drag each activity to its matching stage</h3>
     <div id="items-container" class="grid sm:grid-cols-2 gap-3">
      <!-- Items will be populated by JavaScript -->
     </div>
    </div><!-- Feedback Area -->
    <div id="feedback-area" class="mt-6 hidden">
     <div id="feedback-content" class="rounded-xl p-6 text-center fade-in" style="background-color: white;">
      <!-- Feedback will be shown here -->
     </div>
    </div><!-- Action Buttons -->
    <div class="flex justify-center gap-4 mt-6">
     <button id="check-btn" class="px-6 py-3 rounded-lg font-semibold text-white transition-all hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed" style="background-color: #0070F0;" disabled> Check Answers </button> <button id="reset-btn" class="px-6 py-3 rounded-lg font-semibold border-2 transition-all hover:opacity-90" style="color: #002855; border-color: #002855; background-color: transparent;"> Start Over </button>
    </div>
   </div>
  </div>
  <script>
    const defaultConfig = {
      main_title: "From Observation to Independence",
      intro_text: "Match each coaching activity to the correct stage of the learning process",
      background_color: "#F1F1F1",
      primary_color: "#002855",
      secondary_color: "#0070F0",
      accent_color: "#97E152",
      highlight_color: "#46B1EF",
      text_color: "#002855"
    };

    const activities = [
      { id: 1, text: "The peer coach demonstrates the thinking process aloud", correctStage: "i-do" },
      { id: 2, text: "Student asks clarifying questions about the method shown", correctStage: "i-do" },
      { id: 3, text: "Peer coach uses thoughtful questions to guide student reflection", correctStage: "we-do" },
      { id: 4, text: "Peer coach provides feedback on how the student applied the technique", correctStage: "we-do" },
      { id: 5, text: "Student creates their own study materials independently", correctStage: "you-do" },
      { id: 6, text: "Student applies the strategy to new course content alone", correctStage: "you-do" }
    ];

    let placedItems = {};
    let isChecked = false;

    function shuffleArray(array) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    function createDraggableItem(activity) {
      const item = document.createElement('div');
      item.className = 'draggable-item rounded-lg p-4 border-2 flex items-center gap-3';
      item.style.backgroundColor = '#f8f9fa';
      item.style.borderColor = '#e5e5e5';
      item.draggable = true;
      item.dataset.id = activity.id;
      item.innerHTML = `
        <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0" style="background-color: #46B1EF;">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"/>
          </svg>
        </div>
        <span class="text-sm font-medium" style="color: #002855;">${activity.text}</span>
      `;

      item.addEventListener('dragstart', handleDragStart);
      item.addEventListener('dragend', handleDragEnd);

      return item;
    }

    function handleDragStart(e) {
      if (isChecked) return;
      e.target.classList.add('dragging');
      e.dataTransfer.setData('text/plain', e.target.dataset.id);
      e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragEnd(e) {
      e.target.classList.remove('dragging');
    }

    function setupDropZones() {
      const dropZones = document.querySelectorAll('.drop-zone');
      
      dropZones.forEach(zone => {
        zone.addEventListener('dragover', (e) => {
          if (isChecked) return;
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          zone.classList.add('drag-over');
        });

        zone.addEventListener('dragleave', () => {
          zone.classList.remove('drag-over');
        });

        zone.addEventListener('drop', (e) => {
          if (isChecked) return;
          e.preventDefault();
          zone.classList.remove('drag-over');
          
          const itemId = e.dataTransfer.getData('text/plain');
          const item = document.querySelector(`[data-id="${itemId}"]`);
          
          if (item) {
            const stageId = zone.id.replace('drop-', '');
            
            // Remove from previous location tracking
            Object.keys(placedItems).forEach(stage => {
              placedItems[stage] = placedItems[stage]?.filter(id => id !== parseInt(itemId));
            });
            
            // Add to new stage
            if (!placedItems[stageId]) {
              placedItems[stageId] = [];
            }
            placedItems[stageId].push(parseInt(itemId));
            
            zone.appendChild(item);
            item.style.borderColor = '#0070F0';
            
            updateProgress();
          }
        });
      });

      // Also allow dropping back to items container
      const itemsContainer = document.getElementById('items-container');
      itemsContainer.addEventListener('dragover', (e) => {
        if (isChecked) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
      });

      itemsContainer.addEventListener('drop', (e) => {
        if (isChecked) return;
        e.preventDefault();
        
        const itemId = e.dataTransfer.getData('text/plain');
        const item = document.querySelector(`[data-id="${itemId}"]`);
        
        if (item) {
          Object.keys(placedItems).forEach(stage => {
            placedItems[stage] = placedItems[stage]?.filter(id => id !== parseInt(itemId));
          });
          
          itemsContainer.appendChild(item);
          item.style.borderColor = '#e5e5e5';
          item.classList.remove('correct-answer', 'incorrect-answer');
          
          updateProgress();
        }
      });
    }

    function updateProgress() {
      const totalPlaced = Object.values(placedItems).reduce((sum, arr) => sum + (arr?.length || 0), 0);
      const progressBar = document.getElementById('progress-bar');
      const progressText = document.getElementById('progress-text');
      const checkBtn = document.getElementById('check-btn');
      
      const percentage = (totalPlaced / activities.length) * 100;
      progressBar.style.width = `${percentage}%`;
      progressText.textContent = `${totalPlaced}/${activities.length}`;
      
      checkBtn.disabled = totalPlaced < activities.length;
    }

    function checkAnswers() {
      isChecked = true;
      let correct = 0;
      const feedbackArea = document.getElementById('feedback-area');
      const feedbackContent = document.getElementById('feedback-content');
      
      activities.forEach(activity => {
        const item = document.querySelector(`[data-id="${activity.id}"]`);
        const currentStage = Object.keys(placedItems).find(stage => 
          placedItems[stage]?.includes(activity.id)
        );
        
        if (currentStage === activity.correctStage) {
          item.classList.add('correct-answer');
          item.classList.remove('incorrect-answer');
          correct++;
        } else {
          item.classList.add('incorrect-answer');
          item.classList.remove('correct-answer');
        }
      });

      feedbackArea.classList.remove('hidden');
      
      if (correct === activities.length) {
        feedbackContent.innerHTML = `
          <div class="text-6xl mb-4">🎉</div>
          <h3 class="text-2xl font-bold mb-2" style="color: #97E152;">Excellent Work!</h3>
          <p class="text-lg" style="color: #002855;">You correctly matched all ${activities.length} activities to their stages!</p>
          <p class="mt-3 text-sm" style="color: #46B1EF;">You understand how coaching progresses from demonstration through guided practice to independence.</p>
        `;
      } else {
        feedbackContent.innerHTML = `
          <div class="text-6xl mb-4">💪</div>
          <h3 class="text-2xl font-bold mb-2" style="color: #0070F0;">Keep Going!</h3>
          <p class="text-lg" style="color: #002855;">You got ${correct} out of ${activities.length} correct.</p>
          <p class="mt-3 text-sm" style="color: #46B1EF;">Items with a green border are correct. Review the red-bordered items and try again!</p>
        `;
      }

      document.getElementById('check-btn').disabled = true;
    }

    function resetActivity() {
      isChecked = false;
      placedItems = {};
      
      const itemsContainer = document.getElementById('items-container');
      const feedbackArea = document.getElementById('feedback-area');
      
      // Clear drop zones
      document.querySelectorAll('.drop-zone').forEach(zone => {
        zone.innerHTML = '';
      });
      
      // Reset and shuffle items
      itemsContainer.innerHTML = '';
      const shuffledActivities = shuffleArray(activities);
      shuffledActivities.forEach(activity => {
        const item = createDraggableItem(activity);
        itemsContainer.appendChild(item);
      });
      
      feedbackArea.classList.add('hidden');
      updateProgress();
    }

    function initializeActivity() {
      const itemsContainer = document.getElementById('items-container');
      const shuffledActivities = shuffleArray(activities);
      
      shuffledActivities.forEach(activity => {
        const item = createDraggableItem(activity);
        itemsContainer.appendChild(item);
      });
      
      setupDropZones();
      
      document.getElementById('check-btn').addEventListener('click', checkAnswers);
      document.getElementById('reset-btn').addEventListener('click', resetActivity);
    }

    async function onConfigChange(config) {
      const mainTitle = document.getElementById('main-title');
      const introText = document.getElementById('intro-text');
      
      if (mainTitle) {
        mainTitle.textContent = config.main_title || defaultConfig.main_title;
      }
      if (introText) {
        introText.textContent = config.intro_text || defaultConfig.intro_text;
      }
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ["main_title", config.main_title || defaultConfig.main_title],
        ["intro_text", config.intro_text || defaultConfig.intro_text]
      ]);
    }

    // Initialize SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }

    // Initialize activity on load
    initializeActivity();
  </script>
