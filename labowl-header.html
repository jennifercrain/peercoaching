<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAB OWL - Coaching Programming</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/editing_sdk.js"></script>
  <style>
    body { font-family: Arial, sans-serif; font-size: 14px; }
    .section-card {
      border-left: 4px solid #97E152;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      color: #1a1a1a;
    }
    .section-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,40,85,0.1);
    }
    .owl-card {
      background: linear-gradient(135deg, #002855, #0070F0);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      color: #fff;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .owl-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(151,225,82,0.15);
      opacity: 0;
      transition: opacity 0.25s ease;
      border-radius: 12px;
    }
    .owl-card:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 12px 32px rgba(0,112,240,0.3);
    }
    .owl-card:hover::after {
      opacity: 1;
    }
    .owl-card .owl-icon {
      transition: transform 0.3s ease;
    }
    .owl-card:hover .owl-icon {
      transform: rotate(15deg) scale(1.2);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .anim-fade-up {
      animation: fadeUp 0.6s ease forwards;
      opacity: 0;
    }
    .anim-d1 { animation-delay: 0.1s; }
    .anim-d2 { animation-delay: 0.2s; }
    .anim-d3 { animation-delay: 0.3s; }
    .anim-d4 { animation-delay: 0.4s; }
    .anim-d5 { animation-delay: 0.5s; }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
 </head>
 <body data-template-id="__page-root" class="min-h-screen w-full">

     <h2 data-template-id="philosophy-heading" class="canva-text font-bold mb-3"></h2>
     <p data-template-id="philosophy-text" class="canva-text leading-relaxed"></p>
    </section>
    <section class="section-card bg-white rounded-lg p-6 shadow-sm">
     <h2 data-template-id="helps-heading" class="canva-text font-bold mb-3"></h2>
     <ul class="space-y-2">
      <li class="flex items-center gap-2"><i data-lucide="check-circle" class="w-4 h-4 text-green-500 shrink-0"></i><span data-template-id="helps-1" class="canva-text"></span></li>
      <li class="flex items-center gap-2"><i data-lucide="check-circle" class="w-4 h-4 text-green-500 shrink-0"></i><span data-template-id="helps-2" class="canva-text"></span></li>
      <li class="flex items-center gap-2"><i data-lucide="check-circle" class="w-4 h-4 text-green-500 shrink-0"></i><span data-template-id="helps-3" class="canva-text"></span></li>
      <li class="flex items-center gap-2"><i data-lucide="check-circle" class="w-4 h-4 text-green-500 shrink-0"></i><span data-template-id="helps-4" class="canva-text"></span></li>
     </ul>
    </section>
   </div>
   <section class="section-card bg-white rounded-lg p-6 shadow-sm">
    <h2 data-template-id="framework-heading" class="canva-text font-bold mb-3"></h2>
    <p data-template-id="framework-text" class="canva-text leading-relaxed"></p>
   </section>
   <section>
    <h2 data-template-id="owl-helps-heading" class="canva-text font-bold mb-4"></h2>
    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
     <div class="owl-card anim-fade-up anim-d1">
      <div class="flex items-center gap-3 relative z-10"><i data-lucide="search" class="owl-icon w-6 h-6 text-green-300 shrink-0"></i><span data-template-id="owl-helps-1" class="canva-text font-medium"></span>
      </div>
     </div>
     <div class="owl-card anim-fade-up anim-d2">
      <div class="flex items-center gap-3 relative z-10"><i data-lucide="eye" class="owl-icon w-6 h-6 text-green-300 shrink-0"></i><span data-template-id="owl-helps-2" class="canva-text font-medium"></span>
      </div>
     </div>
     <div class="owl-card anim-fade-up anim-d3">
      <div class="flex items-center gap-3 relative z-10"><i data-lucide="flask-conical" class="owl-icon w-6 h-6 text-green-300 shrink-0"></i><span data-template-id="owl-helps-3" class="canva-text font-medium"></span>
      </div>
     </div>
     <div class="owl-card anim-fade-up anim-d4">
      <div class="flex items-center gap-3 relative z-10"><i data-lucide="scan-line" class="owl-icon w-6 h-6 text-green-300 shrink-0"></i><span data-template-id="owl-helps-4" class="canva-text font-medium"></span>
      </div>
     </div>
     <div class="owl-card anim-fade-up anim-d5">
      <div class="flex items-center gap-3 relative z-10"><i data-lucide="rocket" class="owl-icon w-6 h-6 text-green-300 shrink-0"></i><span data-template-id="owl-helps-5" class="canva-text font-medium"></span>
      </div>
     </div>
    </div>
   </section>
  </main>
  <script>
    lucide.createIcons();
  </script>
